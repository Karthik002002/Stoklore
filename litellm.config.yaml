# Starter LiteLLM proxy config for this app's Settings > LiteLLM tab.
#
# Run it with:
#   .venv/bin/litellm --config litellm.config.yaml --port 4000
#
# Then in Settings > LiteLLM, set:
#   Proxy URL: http://localhost:4000
#   API key:   the same value as LITELLM_MASTER_KEY below (leave blank if you remove master_key)

model_list:
  # Add one entry per model you want available as litellm/<model_name> in this app's model
  # picker. `model_name` is what shows up here; `litellm_params.model` is <provider>/<real-model-id>
  # and needs the matching provider API key set as an env var before you start the proxy.
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # - model_name: claude-haiku
  #   litellm_params:
  #     model: anthropic/claude-haiku-4-5
  #     api_key: os.environ/ANTHROPIC_API_KEY

general_settings:
  # Requires every request (including this app's) to send `Authorization: Bearer <this value>`.
  # Remove this whole key to run the proxy with no auth for local-only use.
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  # Proxy-level guardrails, applied to every request through this proxy regardless of which
  # model is used - a second layer beneath the app's own tool-call confirmation gate and
  # prompt-injection wrapping (see llm.py). Docs: https://docs.litellm.ai/docs/proxy/guardrails
  guardrails:
    - guardrail_name: "pii-mask"
      litellm_params:
        guardrail: presidio  # masks emails/phones/card numbers/etc - needs a Presidio service:
        mode: "pre_call"     # `pip install presidio-analyzer presidio-anonymizer` for a local
        # one, or set presidio_analyzer_api_base/presidio_anonymizer_api_base to a hosted one.
        # Not installed by default here - remove this block if you don't need PII masking.
      guardrail_info:
        description: "Masks PII in the user's message before it reaches any model."

    # Swap or add a moderation guardrail once you have a provider for it, e.g.:
    # - guardrail_name: "content-moderation"
    #   litellm_params:
    #     guardrail: lakera_v2
    #     api_key: os.environ/LAKERA_API_KEY
    #     mode: "pre_call"
